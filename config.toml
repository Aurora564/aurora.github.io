baseURL = "https://Aurora564.github.io/"
languageCode = "zh-cn"
title = "Aurora Blog"
theme = "PaperMod"
enableRobotsTXT = true
hasCJKLanguage = true
relativeURLs = false
canonifyURLs = true

[pagination]
  pagerSize = 8

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  author = "Aurora"
  description = "技术、读书与思考"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowFullTextinRSS = true
  ShowToc = true
  TocOpen = false
  mermaid = true

[markup.highlight]
  noClasses = false
  lineNos = true
  style = "github-dark"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true


  [params.homeInfo]
    Title = "Aurora Blog"
    Content = "技术沉淀 · 阅读笔记 · 深度思考"
    AlignSocialIconsTo = "center"

[[menu.main]]
name = "首页"
url = "/"
weight = 1

[[menu.main]]
name = "分类总览"
url = "/categories/"
weight = 2

[[menu.main]]
name = "系列总览"
url = "/series/"
weight = 3

[[menu.main]]
name = "关于"
url = "/about/"
weight = 4
