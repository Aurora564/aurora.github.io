<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <style>
    .bg    { fill: #1e1e2e; }
    .box   { fill: #313244; stroke: #585b70; stroke-width: 1.5; }
    .title { font: bold 13px/1.4 'Courier New', Courier, monospace; }
    .mono  { font: 13px/1.4 'Courier New', Courier, monospace; fill: #cdd6f4; }
    .lbl   { font: 12px/1.4 'Courier New', Courier, monospace; fill: #a6adc8; }
    .note  { font: 11px/1.4 'Courier New', Courier, monospace; fill: #f9e2af; }
  </style>
  <defs>
    <marker id="arrowup" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 6, 4 0, 8 6" fill="#f9e2af"/>
    </marker>
  </defs>

  <rect width="480" height="160" rx="10" class="bg"/>

  <!-- 5 cells -->
  <rect x="40"  y="40" width="70" height="50" class="box"/>
  <rect x="110" y="40" width="70" height="50" class="box"/>
  <rect x="180" y="40" width="70" height="50" class="box"/>
  <rect x="250" y="40" width="70" height="50" class="box"/>
  <rect x="320" y="40" width="70" height="50" class="box"/>

  <text x="75"  y="70" text-anchor="middle" class="mono">10</text>
  <text x="145" y="70" text-anchor="middle" class="mono">20</text>
  <text x="215" y="70" text-anchor="middle" class="mono">30</text>
  <text x="285" y="70" text-anchor="middle" class="mono">40</text>
  <text x="355" y="70" text-anchor="middle" class="mono">50</text>

  <!-- index labels -->
  <text x="75"  y="102" text-anchor="middle" class="lbl">[0]</text>
  <text x="145" y="102" text-anchor="middle" class="lbl">[1]</text>
  <text x="215" y="102" text-anchor="middle" class="lbl">[2]</text>
  <text x="285" y="102" text-anchor="middle" class="lbl">[3]</text>
  <text x="355" y="102" text-anchor="middle" class="lbl">[4]</text>

  <!-- arr arrow at index 0 -->
  <line x1="75" y1="118" x2="75" y2="92" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowup)"/>
  <text x="75" y="134" text-anchor="middle" class="note">arr</text>

  <!-- arr+2 arrow at index 2 -->
  <line x1="215" y1="118" x2="215" y2="92" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowup)"/>
  <text x="215" y="134" text-anchor="middle" class="note">arr+2</text>

  <!-- 地址差标注 -->
  <text x="395" y="70" text-anchor="start" class="lbl" font-size="11">每元素</text>
  <text x="395" y="84" text-anchor="start" class="lbl" font-size="11">4 字节</text>
  <text x="145" y="150" text-anchor="middle" class="lbl">arr+2 与 arr 地址差 8 字节（2×sizeof(int)）</text>
</svg>
