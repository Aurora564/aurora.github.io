<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <style>
    .bg    { fill: #1e1e2e; }
    .box   { fill: #313244; stroke-width: 1.5; }
    .title { font: bold 13px/1.4 'Courier New', Courier, monospace; }
    .mono  { font: 12px/1.4 'Courier New', Courier, monospace; fill: #a6adc8; }
    .lbl   { font: 12px/1.4 'Courier New', Courier, monospace; fill: #cdd6f4; }
    .arrow { font: bold 18px/1 'Courier New', Courier, monospace; fill: #f9e2af; }
    .note  { font: 11px/1.4 'Courier New', Courier, monospace; fill: #6c7086; }
  </style>

  <rect width="520" height="200" rx="10" class="bg"/>

  <!-- main 栈帧左侧 -->
  <rect x="20" y="40" width="180" height="110" rx="3" class="box" stroke="#89b4fa"/>
  <text x="110" y="62"  text-anchor="middle" class="title" fill="#89b4fa">main 的栈帧</text>
  <text x="110" y="84"  text-anchor="middle" class="mono">x = 10</text>
  <text x="110" y="102" text-anchor="middle" class="mono">&amp;x = ...a4</text>
  <text x="110" y="136" text-anchor="middle" class="note">调用后 x 不变</text>

  <!-- 箭头 -->
  <text x="260" y="103" text-anchor="middle" class="arrow">→拷贝→</text>

  <!-- try_double 栈帧右侧 -->
  <rect x="320" y="40" width="180" height="110" rx="3" class="box" stroke="#a6e3a1"/>
  <text x="410" y="62"  text-anchor="middle" class="title" fill="#a6e3a1">try_double 的栈帧</text>
  <text x="410" y="84"  text-anchor="middle" class="mono">n = 10 → 20</text>
  <text x="410" y="102" text-anchor="middle" class="mono">&amp;n = ...7c</text>
  <text x="410" y="136" text-anchor="middle" class="note">仅影印件被修改</text>

  <text x="260" y="178" text-anchor="middle" class="lbl">x 与 n 是两块独立内存，地址不同</text>
</svg>
